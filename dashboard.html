<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - UniHouse Kenya</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div id="main-navigation"></div>

  <div class="container py-4">
    <div id="dashboard-content">
      <div class="text-center py-5">
        <i class="fas fa-spinner fa-spin" style="font-size: 3rem;"></i>
        <p class="mt-3">Loading dashboard...</p>
      </div>
    </div>
  </div>

  <div id="main-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    initDB();

    const user = getCurrentUser();
    if (!user) {
      window.location.href = 'auth.html';
    }

    renderNavigation();
    renderFooter();

    function loadDashboard() {
      const container = document.getElementById('dashboard-content');

      if (user.role === 'student') {
        loadStudentDashboard(container);
      } else if (user.role === 'landlord') {
        loadLandlordDashboard(container);
      } else if (user.role === 'admin') {
        window.location.href = 'admin.html';
      }
    }

    // ============ STUDENT DASHBOARD ============
    function loadStudentDashboard(container) {
      const bookmarks = getUserBookmarks(user.id);
      const messages = getMessagesForUser(user.id);
      const unreadMessages = messages.filter(m => !m.read).length;
      const allListings = getListings();
      const recentListings = allListings.slice(0, 6);

      container.innerHTML = `
        <h2 class="fw-bold mb-4"><i class="fas fa-tachometer-alt"></i> Student Dashboard</h2>
        <p class="text-muted">Welcome back, ${escapeHtml(user.name)}!</p>

        <!-- Stats -->
        <div class="dashboard-stats">
          <div class="stat-card blue">
            <i class="fas fa-bookmark"></i>
            <div class="number">${bookmarks.length}</div>
            <div class="label">Saved Houses</div>
          </div>
          <div class="stat-card green">
            <i class="fas fa-envelope"></i>
            <div class="number">${messages.length}</div>
            <div class="label">Inquiries Sent</div>
          </div>
          <div class="stat-card orange">
            <i class="fas fa-envelope-open"></i>
            <div class="number">${unreadMessages}</div>
            <div class="label">Unread Messages</div>
          </div>
          <div class="stat-card red">
            <i class="fas fa-home"></i>
            <div class="number">${allListings.length}</div>
            <div class="label">Available Houses</div>
          </div>
        </div>

        <div class="row">
          <!-- Saved Listings -->
          <div class="col-md-6">
            <div class="card mb-4">
              <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-heart text-danger"></i> My Saved Houses</h5>
                <a href="listings.html?bookmarks=true" class="btn btn-sm btn-outline-primary">View All</a>
              </div>
              <div class="card-body">
                ${bookmarks.length === 0 ? '<p class="text-muted">No saved houses yet. <a href="listings.html">Browse houses</a> to save them.</p>' : ''}
                <div class="list-group list-group-flush">
                  ${bookmarks.slice(0, 5).map(b => `
                    <a href="listing-detail.html?id=${b.id}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                      <div>
                        <small class="fw-bold">${b.title}</small>
                        <br><small class="text-muted">${formatPrice(b.price)}/month</small>
                      </div>
                      <span class="badge bg-success">${b.status}</span>
                    </a>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>

          <!-- Messages -->
          <div class="col-md-6">
            <div class="card mb-4">
              <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-envelope"></i> My Inquiries</h5>
              </div>
              <div class="card-body">
                ${messages.length === 0 ? '<p class="text-muted">No inquiries yet. Contact a landlord from a listing page.</p>' : ''}
                <div class="list-group list-group-flush">
                  ${messages.slice(0, 5).map(m => `
                    <div class="list-group-item">
                      <div class="d-flex justify-content-between">
                        <small class="fw-bold">Regarding: ${m.listingTitle}</small>
                        <small class="text-muted">${m.date}</small>
                      </div>
                      <small class="text-muted">${truncateText(m.message, 80)}</small>
                      ${!m.read ? '<span class="badge bg-warning ms-2">New</span>' : ''}
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Recent Listings -->
        <div class="card mb-4">
          <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="fas fa-clock"></i> Recent Listings</h5>
            <a href="listings.html" class="btn btn-sm btn-outline-primary">View All</a>
          </div>
          <div class="card-body">
            <div class="row g-3">
              ${recentListings.map(l => {
                const uni = getUniversity(l.universityId);
                return `
                  <div class="col-md-4">
                    <div class="card h-100" onclick="window.location.href='listing-detail.html?id=${l.id}'" style="cursor:pointer">
                      <img src="${l.images[0]}" class="card-img-top" alt="${l.title}" onerror="this.src='https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600&h=400&fit=crop'" style="height:150px;object-fit:cover">
                      <div class="card-body p-2">
                        <small class="fw-bold">${l.title}</small>
                        <br><small class="text-muted">${formatPrice(l.price)}/month - ${uni ? uni.name : ''}</small>
                      </div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>
      `;
    }

    // ============ LANDLORD DASHBOARD ============
    function loadLandlordDashboard(container) {
      const myListings = getListingsByLandlord(user.id);
      const available = myListings.filter(l => l.status === 'available').length;
      const rented = myListings.filter(l => l.status === 'rented').length;
      const totalViews = myListings.reduce((acc, l) => acc + (l.views || 0), 0);
      const messages = getMessagesForLandlord(user.id);
      const unreadMessages = messages.filter(m => !m.read).length;

      container.innerHTML = `
        <h2 class="fw-bold mb-4"><i class="fas fa-tachometer-alt"></i> Landlord Dashboard</h2>
        <p class="text-muted">Welcome back, ${escapeHtml(user.name)}!</p>

        <!-- Stats -->
        <div class="dashboard-stats">
          <div class="stat-card blue">
            <i class="fas fa-home"></i>
            <div class="number">${myListings.length}</div>
            <div class="label">Total Listings</div>
          </div>
          <div class="stat-card green">
            <i class="fas fa-check-circle"></i>
            <div class="number">${available}</div>
            <div class="label">Available</div>
          </div>
          <div class="stat-card red">
            <i class="fas fa-times-circle"></i>
            <div class="number">${rented}</div>
            <div class="label">Rented</div>
          </div>
          <div class="stat-card orange">
            <i class="fas fa-eye"></i>
            <div class="number">${totalViews}</div>
            <div class="label">Total Views</div>
          </div>
        </div>

        <div class="row">
          <!-- My Listings -->
          <div class="col-md-7">
            <div class="card mb-4">
              <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-list"></i> My Listings</h5>
                <a href="post-listing.html" class="btn btn-sm btn-success"><i class="fas fa-plus"></i> Add New</a>
              </div>
              <div class="card-body">
                ${myListings.length === 0 ? '<p class="text-muted">You haven\'t posted any listings yet. <a href="post-listing.html">Post your first house!</a></p>' : ''}
                <div class="table-responsive">
                  <table class="table table-hover">
                    <thead>
                      <tr>
                        <th>Title</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Views</th>
                        <th>Action</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${myListings.map(l => `
                        <tr>
                          <td><a href="listing-detail.html?id=${l.id}">${truncateText(l.title, 30)}</a></td>
                          <td>${formatPrice(l.price)}</td>
                          <td>${getStatusBadge(l.status)}</td>
                          <td>${l.views || 0}</td>
                          <td>
                            <select class="form-select form-select-sm" onchange="changeStatus(${l.id}, this.value)" title="Change status">
                              <option value="available" ${l.status === 'available' ? 'selected' : ''}>Available</option>
                              <option value="rented" ${l.status === 'rented' ? 'selected' : ''}>Rented</option>
                              <option value="pending" ${l.status === 'pending' ? 'selected' : ''}>Pending</option>
                            </select>
                            <button class="btn btn-sm btn-danger mt-1" onclick="deleteListingConfirm(${l.id})"><i class="fas fa-trash"></i></button>
                          </td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          <!-- Messages -->
          <div class="col-md-5">
            <div class="card mb-4">
              <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-envelope"></i> Student Inquiries</h5>
                ${unreadMessages > 0 ? `<span class="badge bg-danger">${unreadMessages} New</span>` : ''}
              </div>
              <div class="card-body">
                ${messages.length === 0 ? '<p class="text-muted">No inquiries yet.</p>' : ''}
                <div class="list-group list-group-flush">
                  ${messages.map(m => `
                    <div class="list-group-item ${!m.read ? 'bg-light' : ''}">
                      <div class="d-flex justify-content-between">
                        <small class="fw-bold">From: ${m.fromName}</small>
                        <small class="text-muted">${m.date}</small>
                      </div>
                      <small class="d-block"><i class="fas fa-home"></i> ${m.listingTitle}</small>
                      <small class="text-muted">${truncateText(m.message, 100)}</small>
                      <div class="mt-1">
                        <small><i class="fas fa-envelope"></i> ${m.fromEmail}</small>
                        ${!m.read ? `<button class="btn btn-sm btn-primary ms-2" onclick="markAsRead(${m.id})">Mark Read</button>` : ''}
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // Landlord actions
    function changeStatus(listingId, newStatus) {
      const listing = getListing(listingId);
      if (listing) {
        listing.status = newStatus;
        const result = updateListing(listing);
        if (result.success) {
          showToast(`Status changed to ${newStatus}`, 'success');
          loadDashboard();
        }
      }
    }

    function deleteListingConfirm(listingId) {
      if (confirm('Are you sure you want to delete this listing?')) {
        const result = deleteListing(listingId);
        if (result.success) {
          showToast('Listing deleted', 'success');
          loadDashboard();
        }
      }
    }

    function markAsRead(messageId) {
      markMessageRead(messageId);
      showToast('Marked as read', 'info');
      loadDashboard();
    }

    // Load dashboard
    loadDashboard();
  </script>
</body>
</html>
