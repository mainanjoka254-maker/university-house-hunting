<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Details - UniHouse Kenya</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div id="main-navigation"></div>

  <div class="container py-4">
    <div id="listing-content">
      <!-- Loading -->
      <div class="text-center py-5">
        <i class="fas fa-spinner fa-spin" style="font-size: 3rem;"></i>
        <p class="mt-3">Loading listing details...</p>
      </div>
    </div>
  </div>

  <div id="main-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    initDB();
    renderNavigation();
    renderFooter();

    const listingId = parseInt(getUrlParam('id'));
    if (!listingId) {
      document.getElementById('listing-content').innerHTML = `
        <div class="text-center py-5">
          <i class="fas fa-exclamation-circle" style="font-size: 4rem; color: #ccc;"></i>
          <h4 class="mt-3 text-muted">Listing not found</h4>
          <a href="listings.html" class="btn btn-primary mt-3">Browse Houses</a>
        </div>
      `;
    } else {
      loadListing(listingId);
      incrementViews(listingId);
    }

    function loadListing(id) {
      const listing = getListing(id);
      if (!listing) {
        document.getElementById('listing-content').innerHTML = `
          <div class="text-center py-5">
            <i class="fas fa-exclamation-circle" style="font-size: 4rem; color: #ccc;"></i>
            <h4 class="mt-3 text-muted">Listing not found</h4>
            <a href="listings.html" class="btn btn-primary mt-3">Browse Houses</a>
          </div>
        `;
        return;
      }

      const uni = getUniversity(listing.universityId);
      const avgRating = getAverageRating(listing.id);
      const reviews = getReviewsForListing(listing.id);
      const user = getCurrentUser();

      document.getElementById('listing-content').innerHTML = `
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-3">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item"><a href="listings.html">Listings</a></li>
            <li class="breadcrumb-item active">${listing.title}</li>
          </ol>
        </nav>

        <div class="row">
          <!-- Main Content -->
          <div class="col-lg-8">
            <!-- Image Gallery -->
            <div class="gallery-grid">
              <div class="main-img">
                <img src="${listing.images[0]}" alt="${listing.title}" onerror="this.src='https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=800&h=500&fit=crop'">
              </div>
              ${listing.images.slice(1, 3).map(img => `
                <img src="${img}" alt="Gallery" onerror="this.src='https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=400&h=250&fit=crop'">
              `).join('')}
            </div>

            <!-- Listing Header -->
            <div class="listing-detail-header">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <h2>${listing.title}</h2>
                  <p class="text-muted mb-1"><i class="fas fa-map-marker-alt text-danger"></i> ${listing.location}</p>
                  <p class="text-muted mb-1"><i class="fas fa-university"></i> ${uni ? uni.name : 'Unknown'}</p>
                  <p class="mb-0"><small class="text-muted"><i class="fas fa-eye"></i> ${listing.views || 0} views</small></p>
                </div>
                <div class="text-end">
                  <h3 class="price-tag">${formatPrice(listing.price)} <small class="text-muted" style="font-size:0.8rem;">/month</small></h3>
                  ${getStatusBadge(listing.status)}
                  <div class="mt-2">
                    <span class="stars" style="font-size:1.2rem;">${renderStars(parseFloat(avgRating))}</span>
                    <small class="text-muted">(${avgRating || 'N/A'} / ${reviews.length} reviews)</small>
                  </div>
                </div>
              </div>
            </div>

            <!-- Description -->
            <div class="listing-detail-header">
              <h5 class="fw-bold"><i class="fas fa-align-left"></i> Description</h5>
              <p>${listing.description}</p>
            </div>

            <!-- Amenities -->
            <div class="listing-detail-header">
              <h5 class="fw-bold"><i class="fas fa-check-circle"></i> Amenities</h5>
              <div class="amenities-list">
                ${listing.amenities.map(a => `
                  <span class="badge-amenity"><i class="fas ${getAmenityIcon(a)}"></i> ${a}</span>
                `).join('')}
              </div>
            </div>

            <!-- Reviews Section -->
            <div class="listing-detail-header">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0"><i class="fas fa-star text-warning"></i> Reviews & Ratings</h5>
                ${user && user.role === 'student' ? `
                  <button class="btn btn-primary btn-sm" onclick="showReviewForm()"><i class="fas fa-plus"></i> Write Review</button>
                ` : ''}
              </div>

              <!-- Review Form -->
              <div id="review-form" style="display:none;" class="mb-4 p-3 bg-light rounded">
                <h6>Write a Review</h6>
                <form onsubmit="submitReview(event, ${listing.id})">
                  <div class="mb-2">
                    <label class="form-label">Rating</label>
                    <div class="star-rating">
                      ${[5,4,3,2,1].map(s => `
                        <span class="star-select" onclick="setRating(${s})" style="cursor:pointer;font-size:1.5rem;color:#ddd;">★</span>
                      `).join('')}
                      <span id="rating-display" class="ms-2 text-muted small">Select rating</span>
                      <input type="hidden" id="review-rating" value="0">
                    </div>
                  </div>
                  <div class="mb-2">
                    <label class="form-label">Comment</label>
                    <textarea class="form-control" id="review-comment" rows="3" required placeholder="Share your experience..."></textarea>
                  </div>
                  <button type="submit" class="btn btn-success btn-sm">Submit Review</button>
                  <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('review-form').style.display='none'">Cancel</button>
                </form>
              </div>

              <!-- Reviews List -->
              <div id="reviews-list">
                ${reviews.length === 0 ? '<p class="text-muted">No reviews yet. Be the first to review!</p>' : ''}
                ${reviews.map(r => `
                  <div class="review-card">
                    <div class="d-flex justify-content-between">
                      <div>
                        <span class="reviewer">${r.userName}</span>
                        <span class="stars ms-2">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                      </div>
                      <span class="date">${r.date}</span>
                    </div>
                    <p class="mb-0 mt-2">${r.comment}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>

          <!-- Sidebar -->
          <div class="col-lg-4">
            <!-- Contact Card -->
            <div class="card mb-4">
              <div class="card-body">
                <h5 class="fw-bold"><i class="fas fa-envelope"></i> Contact Landlord</h5>
                <form onsubmit="sendInquiry(event, ${listing.id})">
                  <div class="mb-2">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-control" id="inquiry-name" required value="${user ? escapeHtml(user.name) : ''}">
                  </div>
                  <div class="mb-2">
                    <label class="form-label">Your Email</label>
                    <input type="email" class="form-control" id="inquiry-email" required value="${user ? escapeHtml(user.email) : ''}">
                  </div>
                  <div class="mb-2">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" id="inquiry-message" rows="3" required placeholder="Hi, I'm interested in this house. Is it still available?"></textarea>
                  </div>
                  <button type="submit" class="btn btn-primary w-100"><i class="fas fa-paper-plane"></i> Send Inquiry</button>
                </form>
              </div>
            </div>

            <!-- Property Info -->
            <div class="card mb-4">
              <div class="card-body">
                <h5 class="fw-bold"><i class="fas fa-info-circle"></i> Property Info</h5>
                <table class="table table-sm">
                  <tr><td>Type</td><td class="fw-bold">${getPropertyTypeLabel(listing.propertyType)}</td></tr>
                  <tr><td>Status</td><td>${getStatusBadge(listing.status)}</td></tr>
                  <tr><td>Listed</td><td>${listing.createdAt}</td></tr>
                  <tr><td>Views</td><td>${listing.views || 0}</td></tr>
                  <tr><td>University</td><td>${uni ? uni.name : 'N/A'}</td></tr>
                </table>
              </div>
            </div>

            <!-- Bookmark -->
            ${user && user.role === 'student' ? `
              <button class="btn ${isBookmarked(user.id, listing.id) ? 'btn-danger' : 'btn-outline-danger'} w-100 mb-3" onclick="toggleBookmarkBtn(${listing.id})">
                <i class="fas fa-heart"></i> ${isBookmarked(user.id, listing.id) ? 'Saved' : 'Save Listing'}
              </button>
            ` : ''}
          </div>
        </div>
      `;
    }

    // Rating selection
    let selectedRating = 0;
    function setRating(val) {
      selectedRating = val;
      document.getElementById('review-rating').value = val;
      document.getElementById('rating-display').textContent = `${val} star(s)`;
      document.querySelectorAll('.star-select').forEach((el, i) => {
        el.style.color = (5 - i) <= val ? '#f39c12' : '#ddd';
      });
    }

    function showReviewForm() {
      document.getElementById('review-form').style.display = 'block';
    }

    function submitReview(e, listingId) {
      e.preventDefault();
      const user = getCurrentUser();
      if (!user) {
        showToast('Please login to submit a review', 'info');
        return;
      }

      const rating = parseInt(document.getElementById('review-rating').value);
      const comment = document.getElementById('review-comment').value;

      if (!rating) {
        showToast('Please select a rating', 'error');
        return;
      }

      const result = addReview({
        listingId,
        userId: user.id,
        userName: user.name,
        rating,
        comment
      });

      if (result.success) {
        showToast('Review submitted!', 'success');
        document.getElementById('review-form').style.display = 'none';
        loadListing(listingId);
      }
    }

    function sendInquiry(e, listingId) {
      e.preventDefault();
      const user = getCurrentUser();
      if (!user) {
        showToast('Please login to contact landlord', 'info');
        return;
      }

      const name = document.getElementById('inquiry-name').value;
      const email = document.getElementById('inquiry-email').value;
      const message = document.getElementById('inquiry-message').value;
      const listing = getListing(listingId);

      const result = sendMessage({
        fromUserId: user.id,
        toUserId: listing.landlordId,
        listingId,
        listingTitle: listing.title,
        fromName: name,
        fromEmail: email,
        message
      });

      if (result.success) {
        showToast('Message sent! Landlord will contact you.', 'success');
        document.getElementById('inquiry-message').value = '';
      }
    }

    function toggleBookmarkBtn(listingId) {
      const user = getCurrentUser();
      if (!user) {
        showToast('Please login to save listings', 'info');
        return;
      }
      const result = toggleBookmark(user.id, listingId);
      showToast(result.bookmarked ? 'Saved to bookmarks' : 'Removed from bookmarks', 'success');
      loadListing(listingId);
    }
  </script>
</body>
</html>
