<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a House - UniHouse Kenya</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div id="main-navigation"></div>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card">
          <div class="card-body p-4">
            <h4 class="fw-bold mb-1"><i class="fas fa-plus-circle text-primary"></i> Post a New House</h4>
            <p class="text-muted mb-4">Fill in the details about the property you want to rent out to students.</p>

            <form id="postListingForm" onsubmit="handlePostListing(event)">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label">Title <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="pl-title" required placeholder="e.g. Modern Bedsitter near Chuka University">
                </div>

                <div class="col-12">
                  <label class="form-label">Description <span class="text-danger">*</span></label>
                  <textarea class="form-control" id="pl-description" rows="4" required placeholder="Describe the property, what's included, nearby amenities..."></textarea>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Property Type <span class="text-danger">*</span></label>
                  <select class="form-select" id="pl-type" required title="Property type">
                    <option value="">Select type</option>
                    <option value="single">Single Room</option>
                    <option value="bedsitter">Bedsitter</option>
                    <option value="1bedroom">1-Bedroom</option>
                    <option value="2bedroom">2-Bedroom</option>
                    <option value="hostel">Hostel</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Monthly Rent (KSh) <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" id="pl-price" required min="500" placeholder="e.g. 3500">
                </div>

                <div class="col-md-6">
                  <label class="form-label">University <span class="text-danger">*</span></label>
                  <select class="form-select" id="pl-university" required title="Select university">
                    <option value="">Select university</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Location <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="pl-location" required placeholder="e.g. Chuka Town, near University">
                </div>

                <div class="col-md-6">
                  <label class="form-label">Latitude</label>
                  <input type="number" step="0.0001" class="form-control" id="pl-lat" placeholder="e.g. -0.3333">
                </div>

                <div class="col-md-6">
                  <label class="form-label">Longitude</label>
                  <input type="number" step="0.0001" class="form-control" id="pl-lng" placeholder="e.g. 37.65">
                </div>

                <div class="col-12">
                  <label class="form-label">Image URLs (one per line)</label>
                  <textarea class="form-control" id="pl-images" rows="3" placeholder="https://example.com/house1.jpg"></textarea>
                  <small class="text-muted">Enter image URLs, one per line. Leave blank to use default images.</small>
                </div>

                <div class="col-12">
                  <label class="form-label">Amenities</label>
                  <div class="row">
                    <div class="col-md-4">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Water" id="amenity-water">
                        <label class="form-check-label" for="amenity-water">Water</label>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Electricity" id="amenity-electricity">
                        <label class="form-check-label" for="amenity-electricity">Electricity</label>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="WiFi" id="amenity-wifi">
                        <label class="form-check-label" for="amenity-wifi">WiFi</label>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Security" id="amenity-security">
                        <label class="form-check-label" for="amenity-security">Security</label>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Parking" id="amenity-parking">
                        <label class="form-check-label" for="amenity-parking">Parking</label>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Furnished" id="amenity-furnished">
                        <label class="form-check-label" for="amenity-furnished">Furnished</label>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Wardrobe" id="amenity-wardrobe">
                        <label class="form-check-label" for="amenity-wardrobe">Wardrobe</label>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Meals" id="amenity-meals">
                        <label class="form-check-label" for="amenity-meals">Meals Included</label>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="col-12 mt-4">
                  <button type="submit" class="btn btn-success btn-lg w-100"><i class="fas fa-cloud-upload-alt"></i> Post Listing</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="main-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    initDB();

    // Check if user is logged in as landlord
    const user = getCurrentUser();
    if (!user) {
      window.location.href = 'auth.html';
    } else if (user.role !== 'landlord') {
      showToast('Only landlords can post listings', 'error');
      setTimeout(() => window.location.href = 'dashboard.html', 1500);
    }

    renderNavigation();
    renderFooter();

    // Load universities into select
    const universities = getUniversities();
    const uniSelect = document.getElementById('pl-university');
    universities.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = `${u.name} - ${u.town}`;
      uniSelect.appendChild(opt);
    });

    function handlePostListing(e) {
      e.preventDefault();

      const amenities = [];
      document.querySelectorAll('#postListingForm input[type="checkbox"]:checked').forEach(cb => {
        amenities.push(cb.value);
      });

      const images = document.getElementById('pl-images').value
        .split('\n')
        .map(url => url.trim())
        .filter(url => url.length > 0);

      if (images.length === 0) {
        images.push('https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600&h=400&fit=crop');
      }

      const listing = {
        title: document.getElementById('pl-title').value,
        description: document.getElementById('pl-description').value,
        propertyType: document.getElementById('pl-type').value,
        price: parseInt(document.getElementById('pl-price').value),
        universityId: parseInt(document.getElementById('pl-university').value),
        location: document.getElementById('pl-location').value,
        lat: parseFloat(document.getElementById('pl-lat').value) || null,
        lng: parseFloat(document.getElementById('pl-lng').value) || null,
        amenities,
        images,
        landlordId: user.id
      };

      const result = addListing(listing);
      if (result.success) {
        showToast('Listing posted successfully!', 'success');
        document.getElementById('postListingForm').reset();
        setTimeout(() => window.location.href = 'listing-detail.html?id=' + result.listing.id, 1500);
      } else {
        showToast('Failed to post listing', 'error');
      }
    }
  </script>
</body>
</html>
