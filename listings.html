<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Houses - UniHouse Kenya</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div id="main-navigation"></div>

  <div class="container py-4">
    <h2 class="fw-bold mb-3"><i class="fas fa-search"></i> Browse Student Houses</h2>

    <!-- Filters Panel -->
    <div class="filter-panel" id="filter-panel">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Search</label>
          <input type="text" id="filterSearch" class="form-control" placeholder="Search by title, location..." oninput="applyFilters()">
        </div>
        <div class="col-md-3">
          <label class="form-label">University</label>
          <select id="filterUniversity" class="form-select" onchange="applyFilters()">
            <option value="">All Universities</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Property Type</label>
          <select id="filterType" class="form-select" onchange="applyFilters()">
            <option value="">All Types</option>
            <option value="single">Single Room</option>
            <option value="bedsitter">Bedsitter</option>
            <option value="1bedroom">1-Bedroom</option>
            <option value="2bedroom">2-Bedroom</option>
            <option value="hostel">Hostel</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Min Price</label>
          <select id="filterMinPrice" class="form-select" onchange="applyFilters()">
            <option value="">Any</option>
            <option value="1000">KSh 1,000</option>
            <option value="2000">KSh 2,000</option>
            <option value="3000">KSh 3,000</option>
            <option value="5000">KSh 5,000</option>
            <option value="8000">KSh 8,000</option>
          </select>
        </div>
        <div class="col-md-1">
          <label class="form-label">Sort</label>
          <select id="filterSort" class="form-select" onchange="applyFilters()">
            <option value="newest">Newest</option>
            <option value="price_asc">Low Price</option>
            <option value="price_desc">High Price</option>
            <option value="popular">Popular</option>
          </select>
        </div>
      </div>
      <div class="row g-3 mt-2">
        <div class="col-md-2">
          <label class="form-label">Max Price</label>
          <select id="filterMaxPrice" class="form-select" onchange="applyFilters()">
            <option value="">Any</option>
            <option value="3000">KSh 3,000</option>
            <option value="5000">KSh 5,000</option>
            <option value="8000">KSh 8,000</option>
            <option value="10000">KSh 10,000</option>
            <option value="15000">KSh 15,000</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Amenities</label>
          <div class="d-flex flex-wrap gap-2">
            <label class="badge-amenity" style="cursor:pointer">
              <input type="checkbox" value="Water" onchange="applyFilters()"> Water
            </label>
            <label class="badge-amenity" style="cursor:pointer">
              <input type="checkbox" value="WiFi" onchange="applyFilters()"> WiFi
            </label>
            <label class="badge-amenity" style="cursor:pointer">
              <input type="checkbox" value="Security" onchange="applyFilters()"> Security
            </label>
            <label class="badge-amenity" style="cursor:pointer">
              <input type="checkbox" value="Parking" onchange="applyFilters()"> Parking
            </label>
            <label class="badge-amenity" style="cursor:pointer">
              <input type="checkbox" value="Furnished" onchange="applyFilters()"> Furnished
            </label>
          </div>
        </div>
        <div class="col-md-2">
          <label class="form-label">Status</label>
          <select id="filterStatus" class="form-select" onchange="applyFilters()">
            <option value="">All</option>
            <option value="available">Available</option>
            <option value="rented">Rented</option>
          </select>
        </div>
        <div class="col-md-2 d-flex align-items-end">
          <button class="btn btn-secondary w-100" onclick="clearFilters()"><i class="fas fa-undo"></i> Reset</button>
        </div>
      </div>
    </div>

    <!-- Results Stats -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <p id="results-count" class="text-muted mb-0">Loading...</p>
      <button class="btn btn-outline-primary btn-sm" onclick="toggleMap()"><i class="fas fa-map-marked-alt"></i> Toggle Map</button>
    </div>

    <!-- Map -->
    <div id="map-container" style="display:none; margin-bottom: 1.5rem;">
      <div id="map"></div>
    </div>

    <!-- Listings Grid -->
    <div id="listings-container" class="row g-4">
      <!-- Loaded via JS -->
    </div>
  </div>

  <div id="main-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    initDB();
    renderNavigation();
    renderFooter();

    let map = null;
    let mapMarkers = [];

    // Load universities into filter
    const universities = getUniversities();
    const filterUni = document.getElementById('filterUniversity');
    universities.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = `${u.name} - ${u.town}`;
      filterUni.appendChild(opt);
    });

    // Set filters from URL params
    const urlUni = getUrlParam('university');
    const urlSearch = getUrlParam('search');
    const urlBookmarks = getUrlParam('bookmarks');
    const urlMy = getUrlParam('my');

    if (urlUni) filterUni.value = urlUni;
    if (urlSearch) document.getElementById('filterSearch').value = decodeURIComponent(urlSearch);

    // Apply filters and render
    function applyFilters() {
      const filters = {
        universityId: document.getElementById('filterUniversity').value,
        search: document.getElementById('filterSearch').value,
        propertyType: document.getElementById('filterType').value,
        minPrice: document.getElementById('filterMinPrice').value,
        maxPrice: document.getElementById('filterMaxPrice').value,
        status: document.getElementById('filterStatus').value,
        sort: document.getElementById('filterSort').value
      };

      // Get amenities
      const amenityCheckboxes = document.querySelectorAll('#filter-panel input[type="checkbox"]:checked');
      filters.amenities = Array.from(amenityCheckboxes).map(cb => cb.value);

      let listings;
      if (urlBookmarks && getCurrentUser()) {
        listings = getUserBookmarks(getCurrentUser().id);
      } else if (urlMy && getCurrentUser()) {
        listings = getListingsByLandlord(getCurrentUser().id);
      } else {
        listings = searchListings(filters);
      }

      renderListings(listings);
      updateMapMarkers(listings);
      document.getElementById('results-count').textContent = `${listings.length} house(s) found`;
    }

    function renderListings(listings) {
      const container = document.getElementById('listings-container');
      const user = getCurrentUser();

      if (listings.length === 0) {
        container.innerHTML = `
          <div class="col-12 text-center py-5">
            <i class="fas fa-home" style="font-size: 4rem; color: #ccc;"></i>
            <h4 class="mt-3 text-muted">No houses found</h4>
            <p>Try adjusting your filters or search criteria</p>
          </div>
        `;
        return;
      }

      container.innerHTML = listings.map(l => {
        const uni = getUniversity(l.universityId);
        const avgRating = getAverageRating(l.id);
        const bookmarked = user ? isBookmarked(user.id, l.id) : false;
        return `
          <div class="col-md-6 col-lg-4">
            <div class="card listing-card h-100">
              <img src="${l.images[0]}" class="card-img-top" alt="${l.title}" onerror="this.src='https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600&h=400&fit=crop'" style="cursor:pointer" onclick="window.location.href='listing-detail.html?id=${l.id}'">
              <div class="card-body d-flex flex-column">
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <h6 class="card-title mb-0" style="cursor:pointer" onclick="window.location.href='listing-detail.html?id=${l.id}'">${l.title}</h6>
                  ${getStatusBadge(l.status)}
                </div>
                <p class="location mb-2"><i class="fas fa-map-marker-alt"></i> ${l.location}</p>
                <p class="mb-2"><small class="text-muted"><i class="fas fa-university"></i> ${uni ? uni.name : 'Unknown'}</small></p>
                <p class="card-text flex-grow-1">${truncateText(l.description, 80)}</p>
                <div class="mb-2">
                  ${l.amenities.map(a => `<span class="badge-amenity"><i class="fas ${getAmenityIcon(a)}"></i> ${a}</span>`).join('')}
                </div>
                <div class="d-flex justify-content-between align-items-center mt-2">
                  <span class="price-tag">${formatPrice(l.price)} <span>/month</span></span>
                  <div>
                    <small class="text-muted me-2"><i class="fas fa-star text-warning"></i> ${avgRating || 'N/A'}</small>
                    ${user && user.role === 'student' ? `
                      <button class="btn btn-sm ${bookmarked ? 'btn-danger' : 'btn-outline-danger'}" onclick="event.stopPropagation(); handleBookmark(${l.id})">
                        <i class="fas fa-heart"></i>
                      </button>
                    ` : ''}
                  </div>
                </div>
                <a href="listing-detail.html?id=${l.id}" class="btn btn-primary btn-sm mt-2">View Details</a>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Bookmark handler
    function handleBookmark(listingId) {
      const user = getCurrentUser();
      if (!user) {
        showToast('Please login to save listings', 'info');
        return;
      }
      const result = toggleBookmark(user.id, listingId);
      showToast(result.bookmarked ? 'Saved to bookmarks' : 'Removed from bookmarks', 'success');
      applyFilters();
    }

    // Map functions
    function toggleMap() {
      const container = document.getElementById('map-container');
      if (container.style.display === 'none') {
        container.style.display = 'block';
        setTimeout(initMap, 100);
      } else {
        container.style.display = 'none';
      }
    }

    function initMap() {
      if (map) return;

      map = L.map('map').setView([-0.3, 37.5], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      // Add university markers
      universities.forEach(u => {
        L.marker([u.lat, u.lng])
          .addTo(map)
          .bindPopup(`
            <div class="map-popup">
              <h6><i class="fas fa-university"></i> ${u.name}</h6>
              <p class="mb-0">${u.town}, ${u.county}</p>
              <a href="listings.html?university=${u.id}" class="btn btn-sm btn-primary mt-1">View Houses</a>
            </div>
          `);
      });

      applyFilters();
    }

    function updateMapMarkers(listings) {
      if (!map) return;

      // Clear old markers
      mapMarkers.forEach(m => map.removeLayer(m));
      mapMarkers = [];

      listings.forEach(l => {
        if (l.lat && l.lng) {
          const marker = L.marker([l.lat, l.lng], {
            icon: L.divIcon({
              className: 'custom-marker',
              html: `<div style="background:var(--primary-light);color:white;padding:5px 10px;border-radius:20px;white-space:nowrap;font-weight:bold;font-size:12px;">${formatPrice(l.price)}</div>`
            })
          }).addTo(map);

          marker.bindPopup(`
            <div class="map-popup">
              <h6>${l.title}</h6>
              <p class="price">${formatPrice(l.price)}/month</p>
              <p class="mb-1"><small>${l.location}</small></p>
              <a href="listing-detail.html?id=${l.id}" class="btn btn-sm btn-primary">View Details</a>
            </div>
          `);

          mapMarkers.push(marker);
        }
      });

      // Fit bounds if markers exist
      if (mapMarkers.length > 0) {
        const group = L.featureGroup(mapMarkers);
        map.fitBounds(group.getBounds().pad(0.1));
      }
    }

    function clearFilters() {
      document.getElementById('filterSearch').value = '';
      document.getElementById('filterUniversity').value = '';
      document.getElementById('filterType').value = '';
      document.getElementById('filterMinPrice').value = '';
      document.getElementById('filterMaxPrice').value = '';
      document.getElementById('filterStatus').value = '';
      document.getElementById('filterSort').value = 'newest';
      document.querySelectorAll('#filter-panel input[type="checkbox"]').forEach(cb => cb.checked = false);
      applyFilters();
    }

    // Initial load
    applyFilters();
  </script>
</body>
</html>
